      .toggle-checkbox:checked {

      .toggle-checkbox::before {
        content: '';
        position: absolute;
        top: 0.2rem;
        left: 0.2rem;
        width: 1.2rem;
        height: 1.2rem;
        background-color: white;
        border-radius: 9999px;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
